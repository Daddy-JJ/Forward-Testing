<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Create a Forward Testing account."><title>Create account | Forward Testing</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"><script src="https://cdn.tailwindcss.com"></script><script src="assets/js/tailwind-config.js"></script><script src="https://unpkg.com/lucide@latest" defer></script><script src="assets/js/app.js" defer></script></head>
<body class="bg-slate-50 font-sans text-slate-950 antialiased"><div data-site-header></div><main class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-12"><section class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm sm:p-8" aria-labelledby="register-title"><h1 id="register-title" class="text-2xl font-bold">Create account</h1><p class="mt-2 text-sm text-slate-600">Start building your forward-testing record.</p><div class="mt-4 rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-700"><p class="font-semibold text-slate-900">Informasi</p><p class="mt-2">Registrasi tidak aktif dalam demo ini. Silakan gunakan akun dummy pada halaman login.</p></div><form id="register-form" class="mt-8 space-y-5" action="#" method="get"><div><label for="name" class="block text-sm font-medium text-slate-800">Full name</label><input id="name" name="name" type="text" autocomplete="name" required class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-200"></div><div><label for="email" class="block text-sm font-medium text-slate-800">Email address</label><input id="email" name="email" type="email" autocomplete="email" required class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-200"></div><div><label for="password" class="block text-sm font-medium text-slate-800">Password</label><input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required class="mt-2 w-full rounded-md border border-slate-300 px-3 py-2.5 text-sm outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-200"><p class="mt-2 text-xs text-slate-500">Use at least 8 characters.</p></div><button type="submit" class="w-full rounded-md bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:ring-offset-2">Create account</button></form><p id="register-feedback" class="mt-4 text-sm text-slate-600"></p><p class="mt-6 text-center text-sm text-slate-600">Already have an account? <a href="login.html" class="font-semibold text-blue-700 hover:text-blue-800">Log in</a></p></section></main></body></html>
